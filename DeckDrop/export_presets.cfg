; Godot 4 Android export preset for DeckDrop.
;
; Two presets:
;   [preset.0] Android — Debug   (APK, debug signed, for local testing on device)
;   [preset.1] Android — Release (AAB, custom-signed, for Play Console upload)
;
; The release preset uses the Gradle custom build path so we can emit an
; .aab (Android App Bundle) — Play has required AAB since Aug 2021 for
; new apps. To make the custom build available you must run, inside the
; Godot editor: Project → Install Android Build Template (writes the
; DeckDrop/android/build/ folder, which we DON'T commit).
;
; Before the first release build you also need a signing keystore. See
; PLAY_STORE_CHECKLIST.md → Signing for the exact commands. The release
; preset reads the keystore path + passwords from environment variables
; so they never land in the repo.

[preset.0]

name="Android (Debug APK)"
platform="Android"
runnable=true
advanced_options=false
dedicated_server=false
custom_features=""
export_filter="all_resources"
include_filter=""
exclude_filter=""
export_path="builds/DeckDrop-debug.apk"
encryption_include_filters=""
encryption_exclude_filters=""
encrypt_pck=false
encrypt_directory=false
script_export_mode=2

[preset.0.options]

custom_template/debug=""
custom_template/release=""
gradle_build/use_gradle_build=false
gradle_build/gradle_build_directory="res://android/build"
gradle_build/android_source_template=""
gradle_build/compress_native_libraries=false
gradle_build/export_format=0
gradle_build/min_sdk=""
gradle_build/target_sdk=""
architectures/armeabi-v7a=false
architectures/arm64-v8a=true
architectures/x86=false
architectures/x86_64=false
version/code=1
version/name="1.0.0"
package/unique_name="com.kriscagle.deckdrop"
package/name="DeckDrop"
package/signed=true
package/app_category=0
package/retain_data_on_uninstall=false
package/exclude_from_recents=false
package/show_in_android_tv=false
package/show_in_app_library=true
package/show_as_launcher_app=false
launcher_icons/main_192x192=""
launcher_icons/adaptive_foreground_432x432=""
launcher_icons/adaptive_background_432x432=""
launcher_icons/adaptive_monochrome_432x432=""
graphics/opengl_debug=false
xr_features/xr_mode=0
screen/immersive_mode=true
screen/support_small=true
screen/support_normal=true
screen/support_large=true
screen/support_xlarge=true
user_data_backup/allow=false
command_line/extra_args=""
apk_expansion/enable=false
apk_expansion/SALT=""
apk_expansion/public_key=""
permissions/custom_permissions=PackedStringArray()
permissions/access_checkin_properties=false
permissions/access_network_state=false
permissions/access_wifi_state=false
permissions/internet=false

[preset.1]

name="Android (Release AAB)"
platform="Android"
runnable=false
advanced_options=true
dedicated_server=false
custom_features=""
export_filter="all_resources"
include_filter=""
exclude_filter=""
export_path="builds/DeckDrop-release.aab"
encryption_include_filters=""
encryption_exclude_filters=""
encrypt_pck=false
encrypt_directory=false
script_export_mode=2

[preset.1.options]

custom_template/debug=""
custom_template/release=""
; Gradle build is REQUIRED for AAB output. Install via the editor:
;   Project → Install Android Build Template
gradle_build/use_gradle_build=true
gradle_build/gradle_build_directory="res://android/build"
gradle_build/android_source_template=""
gradle_build/compress_native_libraries=false
gradle_build/export_format=1
gradle_build/min_sdk="24"
gradle_build/target_sdk="34"
; arm64-v8a is the only 64-bit ARM Android target; Play requires 64-bit
; support. armeabi-v7a is the 32-bit ARM fallback for older devices.
architectures/armeabi-v7a=true
architectures/arm64-v8a=true
architectures/x86=false
architectures/x86_64=false
version/code=1
version/name="1.0.0"
package/unique_name="com.kriscagle.deckdrop"
package/name="DeckDrop"
package/signed=true
package/app_category=0
package/retain_data_on_uninstall=false
package/exclude_from_recents=false
package/show_in_android_tv=false
package/show_in_app_library=true
package/show_as_launcher_app=false
launcher_icons/main_192x192=""
launcher_icons/adaptive_foreground_432x432=""
launcher_icons/adaptive_background_432x432=""
launcher_icons/adaptive_monochrome_432x432=""
graphics/opengl_debug=false
xr_features/xr_mode=0
screen/immersive_mode=true
screen/support_small=true
screen/support_normal=true
screen/support_large=true
screen/support_xlarge=true
user_data_backup/allow=false
command_line/extra_args=""
apk_expansion/enable=false
apk_expansion/SALT=""
apk_expansion/public_key=""
; DeckDrop is fully offline (no ads, no analytics, no leaderboard servers)
; so we declare zero permissions. If you later add analytics or remote
; leaderboards, set permissions/internet=true.
permissions/custom_permissions=PackedStringArray()
permissions/access_checkin_properties=false
permissions/access_network_state=false
permissions/access_wifi_state=false
permissions/internet=false
