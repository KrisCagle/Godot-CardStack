<?xml version="1.0" encoding="UTF-8"?>
<!--
  DeckDrop app icon (512x512). Casino-felt background with a fanned stack
  of three cards above a gold "DECKDROP" wordmark. Designed to read at
  both 512x512 (Play listing hi-res) and 48x48 (launcher icon) without
  the text turning to mush. Replace with a designed icon before final
  publishing — this is still a serviceable placeholder, just now with
  the brand name baked in.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <radialGradient id="feltGrad" cx="50%" cy="40%" r="70%">
      <stop offset="0%"   stop-color="#1a4a2a"/>
      <stop offset="60%"  stop-color="#0c2e18"/>
      <stop offset="100%" stop-color="#04150b"/>
    </radialGradient>
    <linearGradient id="cardFront" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#fbf7e8"/>
      <stop offset="100%" stop-color="#e6e0c8"/>
    </linearGradient>
    <linearGradient id="cardBack" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#f2eedf"/>
      <stop offset="100%" stop-color="#d6cfb6"/>
    </linearGradient>
    <linearGradient id="goldGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#fbe49b"/>
      <stop offset="55%"  stop-color="#d4a23a"/>
      <stop offset="100%" stop-color="#8a661c"/>
    </linearGradient>
    <linearGradient id="wordmarkGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#ffe9a0"/>
      <stop offset="55%"  stop-color="#e0b14a"/>
      <stop offset="100%" stop-color="#9c7424"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="6"/>
      <feOffset dx="0" dy="8" result="off"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.45"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="textShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feOffset dx="0" dy="3" result="off"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.7"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Rounded square background. Play masks this for adaptive icons. -->
  <rect width="512" height="512" rx="96" ry="96" fill="url(#feltGrad)"/>

  <!-- Back card (rotated left). Cards shifted up so the wordmark has room. -->
  <g transform="translate(256 215) rotate(-14) translate(-90 -126)" filter="url(#shadow)">
    <rect width="180" height="252" rx="20" ry="20" fill="url(#cardBack)" stroke="#3a2a18" stroke-width="6"/>
    <rect x="18" y="12" width="144" height="9" rx="4.5" ry="4.5" fill="#c8a242"/>
  </g>

  <!-- Middle card (slight right tilt) -->
  <g transform="translate(256 205) rotate(7) translate(-90 -126)" filter="url(#shadow)">
    <rect width="180" height="252" rx="20" ry="20" fill="url(#cardBack)" stroke="#3a2a18" stroke-width="6"/>
    <rect x="18" y="12" width="144" height="9" rx="4.5" ry="4.5" fill="#c8a242"/>
  </g>

  <!-- Front card (slight left tilt, centered) — shows big gold spade -->
  <g transform="translate(256 195) rotate(-3) translate(-90 -126)" filter="url(#shadow)">
    <rect width="180" height="252" rx="20" ry="20" fill="url(#cardFront)" stroke="#2a1a08" stroke-width="7"/>
    <!-- Inner gold ring for the ornate framing -->
    <rect x="9" y="9" width="162" height="234" rx="14" ry="14" fill="none" stroke="#c8a242" stroke-width="2" opacity="0.85"/>
    <!-- Top-left rank "K" -->
    <text x="16" y="56" font-family="Georgia, 'Times New Roman', serif" font-weight="700" font-size="44" fill="#1a1208">K</text>
    <text x="16" y="90" font-family="Georgia, 'Times New Roman', serif" font-size="30" fill="#1a1208">♠</text>
    <!-- Big center spade — same Unicode glyph as the small one under the
         K, just scaled way up and gold-gradient-filled. Using the real
         ♠ character (Georgia rendering) instead of a hand-drawn path so
         the silhouette stays crisp and recognizable as a playing card
         suit. -->
    <text x="90" y="186"
          text-anchor="middle"
          font-family="Georgia, 'Times New Roman', serif"
          font-size="200"
          fill="url(#goldGrad)"
          stroke="#5a3e10"
          stroke-width="2">♠</text>
  </g>

  <!-- Subtle dark band behind the wordmark so the gold text pops cleanly
       against the felt without needing a literal divider line. -->
  <rect x="0" y="380" width="512" height="132" fill="#000" opacity="0.18"/>

  <!-- Thin gold separator above the wordmark — reads as a casino marquee
       rule. Inset from the rounded corners so it doesn't poke past them. -->
  <rect x="76" y="394" width="360" height="2" fill="#c8a242" opacity="0.7"/>

  <!-- DECKDROP wordmark. Bold sans for legibility at small launcher sizes;
       the serif Georgia from the card would mush below ~96px tall. Wide
       letter-spacing reads as luxe / casino marquee. -->
  <text x="256" y="467"
        text-anchor="middle"
        font-family="'Helvetica Neue', 'Arial Black', sans-serif"
        font-weight="900"
        font-size="62"
        letter-spacing="6"
        fill="url(#wordmarkGrad)"
        stroke="#5a3e10"
        stroke-width="1.5"
        filter="url(#textShadow)">DECKDROP</text>
</svg>
