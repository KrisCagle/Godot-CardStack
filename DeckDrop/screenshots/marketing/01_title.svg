<?xml version="1.0" encoding="UTF-8"?>
<!--
  Play Store screenshot #1 — Title screen with feature callouts.
  Fully self-contained SVG (no external image refs). Recreates the
  DeckDrop title screen UI faithfully and overlays gold marketing copy
  describing the headline features.
  1080x1920, convert to PNG before uploading to Play.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1920" width="1080" height="1920">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#0e1426"/>
      <stop offset="100%" stop-color="#070b18"/>
    </linearGradient>
    <linearGradient id="goldGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#ffe9a0"/>
      <stop offset="55%"  stop-color="#e0b14a"/>
      <stop offset="100%" stop-color="#9c7424"/>
    </linearGradient>
    <linearGradient id="panelGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#1a2238"/>
      <stop offset="100%" stop-color="#0f1626"/>
    </linearGradient>
    <pattern id="diamonds" x="0" y="0" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M30 5 L55 30 L30 55 L5 30 Z" fill="none" stroke="#1d2843" stroke-width="0.8"/>
    </pattern>
    <filter id="goldGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="4"/>
      <feOffset dx="0" dy="4" result="off"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.7"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1080" height="1920" fill="url(#bgGrad)"/>
  <rect width="1080" height="1920" fill="url(#diamonds)" opacity="0.5"/>

  <!-- Top headline overlay -->
  <text x="540" y="140" text-anchor="middle"
        font-family="'Helvetica Neue', 'Arial Black', sans-serif"
        font-weight="900" font-size="74" letter-spacing="4"
        fill="url(#goldGrad)" stroke="#5a3e10" stroke-width="2"
        filter="url(#goldGlow)">CONNECT 4 MEETS POKER</text>
  <text x="540" y="200" text-anchor="middle"
        font-family="Georgia, 'Times New Roman', serif"
        font-style="italic" font-size="34" letter-spacing="2"
        fill="#e8d8b0" opacity="0.92">Tap to drop. Build hands. Chase the score.</text>

  <!-- Suits row -->
  <g font-family="Georgia, serif" font-size="64" fill="url(#goldGrad)" text-anchor="middle">
    <text x="380" y="370">♠</text>
    <text x="475" y="370">♥</text>
    <text x="600" y="370">♦</text>
    <text x="700" y="370">♣</text>
  </g>

  <!-- Title panel (matches the in-game card frame) -->
  <rect x="115" y="395" width="850" height="1090" rx="22" ry="22"
        fill="url(#panelGrad)" stroke="url(#goldGrad)" stroke-width="3"/>
  <rect x="125" y="405" width="830" height="1070" rx="16" ry="16"
        fill="none" stroke="#c8a242" stroke-width="1" opacity="0.5"/>

  <!-- DeckDrop title (matches the SuperMellow chunky-yellow look) -->
  <text x="540" y="555" text-anchor="middle"
        font-family="'Arial Black', 'Helvetica Neue', sans-serif"
        font-weight="900" font-size="120" letter-spacing="-2"
        fill="#f9d24a" stroke="#7a5818" stroke-width="3"
        filter="url(#goldGlow)">DeckDrop</text>

  <!-- Subtitle / pitch -->
  <text x="540" y="640" text-anchor="middle"
        font-family="'Helvetica Neue', sans-serif" font-size="32" fill="#a8b4d0">
    Make poker hands across rows
  </text>
  <text x="540" y="685" text-anchor="middle"
        font-family="'Helvetica Neue', sans-serif" font-size="32" fill="#a8b4d0">
    and columns. Beat the dealer.
  </text>

  <!-- Lv 8 (matches the actual game state from your screenshot) -->
  <text x="540" y="830" text-anchor="middle"
        font-family="'Helvetica Neue', sans-serif" font-weight="600" font-size="56" fill="#f0f3fa">Lv 8</text>

  <!-- XP bar -->
  <rect x="225" y="870" width="630" height="22" rx="11" fill="#0a1020" stroke="#1d2843" stroke-width="1.5"/>
  <rect x="227" y="872" width="110" height="18" rx="9" fill="url(#goldGrad)"/>

  <!-- Best score line -->
  <text x="540" y="945" text-anchor="middle"
        font-family="'Helvetica Neue', sans-serif" font-size="34" fill="#9aa6c2">Best: 34,911</text>

  <!-- Buttons -->
  <g>
    <rect x="225" y="1020" width="630" height="105" rx="14" ry="14"
          fill="#0f1830" stroke="url(#goldGrad)" stroke-width="2.5"/>
    <text x="540" y="1085" text-anchor="middle"
          font-family="'Helvetica Neue', sans-serif" font-weight="800"
          font-size="46" letter-spacing="6" fill="#f0f3fa">PLAY</text>

    <rect x="225" y="1150" width="630" height="105" rx="14" ry="14"
          fill="#0f1830" stroke="#3a4a6a" stroke-width="2"/>
    <text x="540" y="1212" text-anchor="middle"
          font-family="'Helvetica Neue', sans-serif" font-weight="700"
          font-size="38" letter-spacing="4" fill="#a8b4d0">📆 DAILY · 34,911</text>

    <rect x="225" y="1280" width="630" height="105" rx="14" ry="14"
          fill="#0f1830" stroke="#3a4a6a" stroke-width="2"/>
    <text x="540" y="1342" text-anchor="middle"
          font-family="'Helvetica Neue', sans-serif" font-weight="700"
          font-size="38" letter-spacing="4" fill="#a8b4d0">PROGRESS</text>
  </g>

  <!-- Bottom feature callouts (the marketing gold) -->
  <g font-family="'Helvetica Neue', 'Arial Black', sans-serif" text-anchor="middle">
    <text x="540" y="1610" font-weight="900" font-size="60" letter-spacing="3"
          fill="url(#goldGrad)" stroke="#5a3e10" stroke-width="1.5"
          filter="url(#goldGlow)">FREE · OFFLINE · NO ADS</text>
    <text x="540" y="1690" font-weight="800" font-size="44" letter-spacing="2"
          fill="#f9d24a" filter="url(#goldGlow)">10 UNLOCKABLE THEMES</text>
    <text x="540" y="1748" font-weight="800" font-size="44" letter-spacing="2"
          fill="#f9d24a" filter="url(#goldGlow)">24 ACHIEVEMENTS · DAILY CHALLENGES</text>
  </g>

  <!-- DECKDROP wordmark at the very bottom -->
  <text x="540" y="1880" text-anchor="middle"
        font-family="'Helvetica Neue', 'Arial Black', sans-serif"
        font-weight="900" font-size="48" letter-spacing="10"
        fill="url(#goldGrad)" stroke="#5a3e10" stroke-width="1.5"
        filter="url(#goldGlow)">DECKDROP</text>
</svg>
