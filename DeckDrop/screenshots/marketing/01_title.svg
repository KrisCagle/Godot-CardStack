<?xml version="1.0" encoding="UTF-8"?>
<!--
  Play Store screenshot #1 — Title screen with marketing overlay.
  Self-contained SVG. Recreates the DeckDrop title screen and overlays
  bold gold copy that sells the hook in three lines: genre, scope, price.
  1080x1920, convert to PNG before uploading to Play.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1920" width="1080" height="1920">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#0e1426"/>
      <stop offset="100%" stop-color="#070b18"/>
    </linearGradient>
    <linearGradient id="goldGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#ffe9a0"/>
      <stop offset="55%"  stop-color="#e0b14a"/>
      <stop offset="100%" stop-color="#9c7424"/>
    </linearGradient>
    <linearGradient id="panelGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#1a2238"/>
      <stop offset="100%" stop-color="#0f1626"/>
    </linearGradient>
    <pattern id="diamonds" x="0" y="0" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M30 5 L55 30 L30 55 L5 30 Z" fill="none" stroke="#1d2843" stroke-width="0.8"/>
    </pattern>
    <filter id="goldGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="4"/>
      <feOffset dx="0" dy="4" result="off"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.7"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1080" height="1920" fill="url(#bgGrad)"/>
  <rect width="1080" height="1920" fill="url(#diamonds)" opacity="0.5"/>

  <!-- TOP MARKETING HEADLINE -->
  <text x="540" y="120" text-anchor="middle"
        font-family="'Helvetica Neue', 'Arial Black', sans-serif"
        font-weight="900" font-size="82" letter-spacing="4"
        fill="url(#goldGrad)" stroke="#5a3e10" stroke-width="2.5"
        filter="url(#goldGlow)">CONNECT 4 MEETS POKER</text>
  <text x="540" y="185" text-anchor="middle"
        font-family="Georgia, 'Times New Roman', serif"
        font-style="italic" font-size="36" letter-spacing="2"
        fill="#f6e3a8">Tap to drop. Score hands. Climb the deck.</text>

  <!-- Suit symbols -->
  <g font-family="Georgia, serif" font-size="68" fill="url(#goldGrad)" text-anchor="middle">
    <text x="385" y="375">♠</text>
    <text x="480" y="375">♥</text>
    <text x="600" y="375">♦</text>
    <text x="700" y="375">♣</text>
  </g>

  <!-- Title panel -->
  <rect x="115" y="400" width="850" height="1080" rx="22" ry="22"
        fill="url(#panelGrad)" stroke="url(#goldGrad)" stroke-width="3"/>
  <rect x="125" y="410" width="830" height="1060" rx="16" ry="16"
        fill="none" stroke="#c8a242" stroke-width="1" opacity="0.5"/>

  <!-- DeckDrop title -->
  <text x="540" y="560" text-anchor="middle"
        font-family="'Arial Black', 'Helvetica Neue', sans-serif"
        font-weight="900" font-size="124" letter-spacing="-2"
        fill="#f9d24a" stroke="#7a5818" stroke-width="3"
        filter="url(#goldGlow)">DeckDrop</text>

  <text x="540" y="640" text-anchor="middle"
        font-family="'Helvetica Neue', sans-serif" font-size="32" fill="#a8b4d0">
    Make poker hands across rows
  </text>
  <text x="540" y="685" text-anchor="middle"
        font-family="'Helvetica Neue', sans-serif" font-size="32" fill="#a8b4d0">
    and columns. Beat the dealer.
  </text>

  <text x="540" y="820" text-anchor="middle"
        font-family="'Helvetica Neue', sans-serif" font-weight="600" font-size="56" fill="#f0f3fa">Lv 8</text>

  <rect x="225" y="860" width="630" height="22" rx="11" fill="#0a1020" stroke="#1d2843" stroke-width="1.5"/>
  <rect x="227" y="862" width="110" height="18" rx="9" fill="url(#goldGrad)"/>

  <text x="540" y="935" text-anchor="middle"
        font-family="'Helvetica Neue', sans-serif" font-size="34" fill="#9aa6c2">Best: 34,911</text>
  <text x="540" y="980" text-anchor="middle"
        font-family="'Helvetica Neue', sans-serif" font-size="28" fill="#7a86a4">Next: Forest at Lv 12</text>

  <g>
    <rect x="225" y="1040" width="630" height="105" rx="14" ry="14"
          fill="#0f1830" stroke="url(#goldGrad)" stroke-width="2.5"/>
    <text x="540" y="1105" text-anchor="middle"
          font-family="'Helvetica Neue', sans-serif" font-weight="800"
          font-size="46" letter-spacing="6" fill="#f0f3fa">PLAY</text>

    <rect x="225" y="1170" width="630" height="105" rx="14" ry="14"
          fill="#0f1830" stroke="#3a4a6a" stroke-width="2"/>
    <text x="540" y="1232" text-anchor="middle"
          font-family="'Helvetica Neue', sans-serif" font-weight="700"
          font-size="38" letter-spacing="4" fill="#a8b4d0">📆 DAILY · 34,911</text>

    <rect x="225" y="1300" width="630" height="105" rx="14" ry="14"
          fill="#0f1830" stroke="#3a4a6a" stroke-width="2"/>
    <text x="540" y="1362" text-anchor="middle"
          font-family="'Helvetica Neue', sans-serif" font-weight="700"
          font-size="38" letter-spacing="4" fill="#a8b4d0">PROGRESS</text>
  </g>

  <!-- BIG GOLD FEATURE CALLOUTS — the "pulls people in" copy -->
  <g font-family="'Helvetica Neue', 'Arial Black', sans-serif" text-anchor="middle">
    <text x="540" y="1620" font-weight="900" font-size="66" letter-spacing="4"
          fill="url(#goldGrad)" stroke="#5a3e10" stroke-width="2"
          filter="url(#goldGlow)">FREE · OFFLINE · NO ADS</text>
    <text x="540" y="1700" font-weight="800" font-size="46" letter-spacing="3"
          fill="#f9d24a" filter="url(#goldGlow)">10 THEMES · 24 ACHIEVEMENTS</text>
    <text x="540" y="1762" font-weight="800" font-size="46" letter-spacing="3"
          fill="#f9d24a" filter="url(#goldGlow)">A NEW DAILY DROP EVERY DAY</text>
  </g>

  <text x="540" y="1885" text-anchor="middle"
        font-family="'Helvetica Neue', 'Arial Black', sans-serif"
        font-weight="900" font-size="48" letter-spacing="10"
        fill="url(#goldGrad)" stroke="#5a3e10" stroke-width="1.5"
        filter="url(#goldGlow)">DECKDROP</text>
</svg>
