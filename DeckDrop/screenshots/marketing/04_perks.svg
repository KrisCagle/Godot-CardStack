<?xml version="1.0" encoding="UTF-8"?>
<!--
  Play Store screenshot #4 — Perk shop with marketing overlay.
  Matches the new perk roll: ECHO COMBO (purple), BASE POWER (yellow),
  JOKER MAGNET (yellow). Sells build-variety / roguelite depth.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1920" width="1080" height="1920">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#0e1426"/>
      <stop offset="100%" stop-color="#070b18"/>
    </linearGradient>
    <linearGradient id="goldGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#ffe9a0"/>
      <stop offset="55%"  stop-color="#e0b14a"/>
      <stop offset="100%" stop-color="#9c7424"/>
    </linearGradient>
    <linearGradient id="panelGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#1a2238"/>
      <stop offset="100%" stop-color="#0f1626"/>
    </linearGradient>
    <pattern id="diamonds" x="0" y="0" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M30 5 L55 30 L30 55 L5 30 Z" fill="none" stroke="#1d2843" stroke-width="0.8"/>
    </pattern>
    <filter id="goldGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="4"/>
      <feOffset dx="0" dy="4" result="off"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.7"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1080" height="1920" fill="url(#bgGrad)"/>
  <rect width="1080" height="1920" fill="url(#diamonds)" opacity="0.5"/>

  <!-- TOP MARKETING HEADLINE -->
  <text x="540" y="100" text-anchor="middle"
        font-family="'Helvetica Neue', 'Arial Black', sans-serif"
        font-weight="900" font-size="72" letter-spacing="4"
        fill="url(#goldGrad)" stroke="#5a3e10" stroke-width="2.5"
        filter="url(#goldGlow)">EVERY RUN, A NEW BUILD</text>
  <text x="540" y="160" text-anchor="middle"
        font-family="Georgia, 'Times New Roman', serif"
        font-style="italic" font-size="34" letter-spacing="2"
        fill="#f6e3a8">Pick a perk between rounds. 25 in the pool.</text>

  <!-- Panel -->
  <rect x="90" y="280" width="900" height="1280" rx="24" ry="24"
        fill="url(#panelGrad)" stroke="url(#goldGrad)" stroke-width="3"/>
  <rect x="100" y="290" width="880" height="1260" rx="18" ry="18"
        fill="none" stroke="#c8a242" stroke-width="1" opacity="0.5"/>

  <text x="540" y="430" text-anchor="middle"
        font-family="'Helvetica Neue', sans-serif" font-weight="800"
        font-size="76" letter-spacing="6" fill="#f0f3fa">CHOOSE A PERK</text>
  <text x="540" y="490" text-anchor="middle"
        font-family="'Helvetica Neue', sans-serif" font-size="30" fill="#9aa6c2">Pick one. Applies for the rest of the run.</text>

  <!-- Perk 1 - ECHO COMBO (purple) -->
  <rect x="170" y="580" width="740" height="220" rx="18" ry="18"
        fill="#101a30" stroke="#c47aff" stroke-width="2.5"/>
  <text x="540" y="660" text-anchor="middle"
        font-family="'Helvetica Neue', sans-serif" font-weight="800"
        font-size="48" letter-spacing="4" fill="#c47aff"
        filter="url(#goldGlow)">ECHO COMBO</text>
  <text x="540" y="730" text-anchor="middle"
        font-family="'Helvetica Neue', sans-serif" font-size="34" fill="#e0c4ff">Surge cards grant +2 combo</text>

  <!-- Perk 2 - BASE POWER (yellow) -->
  <rect x="170" y="830" width="740" height="220" rx="18" ry="18"
        fill="#101a30" stroke="#f9d24a" stroke-width="2.5"/>
  <text x="540" y="910" text-anchor="middle"
        font-family="'Helvetica Neue', sans-serif" font-weight="800"
        font-size="48" letter-spacing="4" fill="#f9d24a"
        filter="url(#goldGlow)">BASE POWER</text>
  <text x="540" y="980" text-anchor="middle"
        font-family="'Helvetica Neue', sans-serif" font-size="34" fill="#f9e8b0">+15% base score on every hand</text>

  <!-- Perk 3 - JOKER MAGNET (yellow) -->
  <rect x="170" y="1080" width="740" height="220" rx="18" ry="18"
        fill="#101a30" stroke="#f9d24a" stroke-width="2.5"/>
  <text x="540" y="1160" text-anchor="middle"
        font-family="'Helvetica Neue', sans-serif" font-weight="800"
        font-size="48" letter-spacing="4" fill="#f9d24a"
        filter="url(#goldGlow)">JOKER MAGNET</text>
  <text x="540" y="1230" text-anchor="middle"
        font-family="'Helvetica Neue', sans-serif" font-size="34" fill="#f9e8b0">Specials are mostly Jokers</text>

  <text x="540" y="1450" text-anchor="middle"
        font-family="Georgia, 'Times New Roman', serif" font-style="italic"
        font-size="34" fill="#7a86a4">+ 22 more perks in the pool</text>

  <!-- BIG GOLD MARKETING OVERLAY -->
  <g font-family="'Helvetica Neue', 'Arial Black', sans-serif" text-anchor="middle">
    <text x="540" y="1680" font-weight="900" font-size="62" letter-spacing="3"
          fill="url(#goldGrad)" stroke="#5a3e10" stroke-width="2"
          filter="url(#goldGlow)">MIX. MATCH. CASCADE.</text>
    <text x="540" y="1755" font-weight="800" font-size="44" letter-spacing="3"
          fill="#f9d24a" filter="url(#goldGlow)">SHOP BETWEEN ROUNDS · NO TWO RUNS ALIKE</text>
  </g>

  <text x="540" y="1885" text-anchor="middle"
        font-family="'Helvetica Neue', 'Arial Black', sans-serif"
        font-weight="900" font-size="42" letter-spacing="8"
        fill="url(#goldGrad)" stroke="#5a3e10" stroke-width="1.5"
        filter="url(#goldGlow)">DECKDROP</text>
</svg>
